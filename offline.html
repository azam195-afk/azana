<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Azana Offline - Final Banget</title>
    <style>
        :root {
            --neon-cyan: #00ffff;
            --dark-bg: #0a0a0c;
            --button-bg: #1e1e22;
            --alert-red: #ff3333;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            padding-top: 5px;
            touch-action: none;
            overflow: hidden;
        }

        /* --- LOGO AREA --- */
        .header { text-align: center; margin-bottom: 5px; }
        
        .logo-azana {
            width: 250px; /* Lebar mantap sesuai bingkai */
            height: auto;
            margin: 0 auto 5px;
            display: block;
        }

        .offline-status {
            background-color: var(--alert-red);
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 4px;
            animation: blink 1.5s infinite;
            margin-bottom: 5px;
            display: inline-block;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        #score-val { color: var(--neon-cyan); font-size: 16px; font-weight: bold; margin-bottom: 5px; }

        /* --- GAME DENGAN GRID KOTAK --- */
        #game-wrapper {
            position: relative;
            padding: 5px;
            background: #18181b;
            border: 2px solid #444;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
        }

        canvas {
            background-color: #000;
            display: block;
            /* INI GRIDNYA BANG */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* --- TOMBOL NEON BULAT ESTETIK --- */
        .controls-container {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .row { display: flex; gap: 15px; }

        .btn {
            background: var(--button-bg);
            color: var(--neon-cyan);
            border: 2px solid #444;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 0 #000;
        }

        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; background: #333; }
        .btn-ok { background: var(--neon-cyan); color: black; font-size: 12px; font-weight: bold; border: none; }

        /* FIX BUAT HP KECIL BIAR GAK KEGULUNG */
        @media (max-height: 700px) {
            .logo-azana { width: 180px; }
            canvas { width: 210px; height: 350px; background-size: 17.5px 17.5px; }
            .btn { width: 58px; height: 58px; font-size: 20px; }
            .btn-ok { font-size: 10px; }
            .controls-container { margin-top: 8px; gap: 8px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png?v=5" alt="Azana Logo" class="logo-azana">
        <div class="offline-status">ANDA OFFLINE</div>
        <div id="score-val">Score: 0</div>
    </div>

    <div id="game-wrapper">
        <canvas id="tetris" width="240" height="400"></canvas>
    </div>

    <div class="controls-container">
        <div class="row">
            <div class="btn" onclick="playerMove(-1)">◀</div>
            <div class="btn btn-ok" onclick="playerRotate(1)">ROTATE</div>
            <div class="btn" onclick="playerMove(1)">▶</div>
        </div>
        <div class="btn" onclick="playerHardDrop()">▼</div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score-val');
        context.scale(20, 20);

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) { if (arena[y][x] === 0) continue outer; }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y; player.score += rowCount * 10; rowCount *= 2;
            }
            updateScore();
        }
        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }
        function createMatrix(w, h) { const matrix = []; while (h--) matrix.push(new Array(w).fill(0)); return matrix; }
        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
            if (type === 'O') return [[4, 4], [4, 4]];
            if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
        }
        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }
        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        context.strokeStyle = '#000';
                        context.lineWidth = 0.05;
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }
        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => { if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value; });
            });
        }
        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) { player.pos.y--; merge(arena, player); playerReset(); arenaSweep(); }
            dropCounter = 0;
        }
        function playerHardDrop() { while (!collide(arena, player)) { player.pos.y++; } player.pos.y--; merge(arena, player); playerReset(); arenaSweep(); dropCounter = 0; }
        function playerMove(dir) { player.pos.x += dir; if (collide(arena, player)) player.pos.x -= dir; }
        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) { arena.forEach(row => row.fill(0)); player.score = 0; updateScore(); }
        }
        function playerRotate(dir) {
            const pos = player.pos.x; let offset = 1; rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset; offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) { rotate(player.matrix, -dir); player.pos.x = pos; return; }
            }
        }
        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) { for (let x = 0; x < y; ++x) { [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]]; } }
            if (dir > 0) matrix.forEach(row => row.reverse()); else matrix.reverse();
        }
        let dropCounter = 0; let dropInterval = 1000; let lastTime = 0;
        function update(time = 0) { const deltaTime = time - lastTime; lastTime = time; dropCounter += deltaTime; if (dropCounter > dropInterval) playerDrop(); draw(); requestAnimationFrame(update); }
        function updateScore() { scoreElement.innerText = "Score: " + player.score; }
        const colors = [null, '#00ffff', '#ff00ff', '#ffff00', '#00ff00', '#ff0000', '#0000ff', '#ff8800'];
        const arena = createMatrix(12, 20);
        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };
        window.addEventListener('online', () => { window.location.href = 'index.html'; });
        playerReset(); updateScore(); update();
    </script>
</body>
</html>
